<nav class="menu">
    <ul class="menu__inner">
        {{- $currentPage := . -}}
        {{ range .Site.Menus.main -}}
            <li><a href="{{ .URL | relLangURL }}">{{ .Name }}</a></li>
        {{- end }}
        {{ if .IsTranslated }} 
            {{ range .Translations }}                
                | &nbsp; <a href="{{ .Permalink }}">{{ .Language.LanguageName }}</span></a>                        
            {{ end }}
        {{ end }}
    </ul>
</nav>
